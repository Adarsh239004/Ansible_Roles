- name: Install extraction tools
  apt:
    name:
      - tar
      - gzip
      - bzip2
      - xz-utils
    state: present
    update_cache: yes

- name: Download JDK 21 tarball
  get_url:
    url: "{{ java21_download_url }}"
    dest: /tmp/OpenJDK21U-jdk.tar.gz
    mode: '0644'
    force: yes

- name: Verify downloaded JDK 21 archive
  command: file /tmp/OpenJDK21U-jdk.tar.gz
  register: jdk21_file
  changed_when: false

- debug:
    var: jdk21_file.stdout

- name: Create Java directory
  file:
    path: /opt/java
    state: directory
    mode: '0755'
  become: yes
  
- name: Extract JDK 21
  unarchive:
    src: /tmp/OpenJDK21U-jdk.tar.gz
    dest: "{{ java_install_dir }}"
    remote_src: yes
    creates: "{{ java_install_dir }}/{{ java21_folder_name }}"

- name: Register Java 21 alternative
  alternatives:
    name: java
    link: /usr/bin/java
    path: "{{ java_install_dir }}/{{ java21_folder_name }}/bin/java"
    priority: 1210

- name: Register Javac 21 alternative
  alternatives:
    name: javac
    link: /usr/bin/javac
    path: "{{ java_install_dir }}/{{ java21_folder_name }}/bin/javac"
    priority: 1210
