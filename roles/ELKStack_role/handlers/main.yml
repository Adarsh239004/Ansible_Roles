# handlers/main.yml

- name: restart elasticsearch
  systemd:
    name: elasticsearch
    state: restarted
    daemon_reload: true

- name: wait for elasticsearch
  uri:
    url: http://localhost:9200
    status_code: [200, 401]
  register: es_check
  retries: 10
  delay: 5
  until: es_check.status in [200, 401]

- name: restart kibana
  systemd:
    name: kibana
    state: restarted

- name: restart logstash
  systemd:
    name: logstash
    state: restarted
