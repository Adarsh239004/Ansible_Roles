<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MyShop | Basic E-Commerce</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #232f3e;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .products {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 30px;
            flex-wrap: wrap;
        }

        .product {
            background: white;
            width: 220px;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .product img {
            width: 100%;
            border-radius: 4px;
        }

        .product h3 {
            margin: 10px 0;
        }

        .price {
            font-size: 18px;
            color: #b12704;
            margin: 10px 0;
        }

        button {
            background-color: #ff9900;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
        }

        button:hover {
            background-color: #e68a00;
        }

        footer {
            background-color: #232f3e;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>🛒 MyShop</h1>
    <p>Basic E-Commerce Website</p>
</header>

<section class="products">
    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Product 1">
        <h3>Smart Watch</h3>
        <p class="price">₹2,999</p>
        <button onclick="addToCart('Smart Watch')">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Product 2">
        <h3>Wireless Headphones</h3>
        <p class="price">₹1,999</p>
        <button onclick="addToCart('Wireless Headphones')">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200" alt="Product 3">
        <h3>Bluetooth Speaker</h3>
        <p class="price">₹1,499</p>
        <button onclick="addToCart('Bluetooth Speaker')">Add to Cart</button>
    </div>
</section>

<footer>
    <p>© 2026 MyShop. All Rights Reserved.</p>
</footer>

<script>
    function addToCart(product) {
        alert(product + " added to cart!");
    }
</script>

</body>
</html>
